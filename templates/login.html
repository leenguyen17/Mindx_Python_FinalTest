<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Netflix Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #0a0a0f;
            --bg-card: #16161e;
            --accent: #e50914;
            --accent-dark: #b20710;
            --text-primary: #e5e5e5;
            --text-secondary: #999;
            --text-muted: #666;
            --border: rgba(255,255,255,0.08);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Background grid pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(229,9,20,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(178,7,16,0.06) 0%, transparent 50%),
                linear-gradient(180deg, rgba(10,10,15,0) 0%, rgba(10,10,15,0.8) 100%);
            z-index: 0;
        }

        /* Noise texture overlay */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            z-index: 0;
            pointer-events: none;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 0 20px;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-brand h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 48px;
            color: var(--accent);
            letter-spacing: 3px;
            line-height: 1;
            text-shadow: 0 0 40px rgba(229,9,20,0.3);
        }

        .login-brand p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 36px;
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Top red accent */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-dark), var(--accent));
        }

        .login-card h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-card .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(229,9,20,0.15);
            background: rgba(229,9,20,0.03);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .error-message {
            background: rgba(229,9,20,0.1);
            border: 1px solid rgba(229,9,20,0.3);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            margin-top: 8px;
        }

        .login-btn:hover {
            background: var(--accent-dark);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(229,9,20,0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 12px;
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: var(--accent);
            border-radius: 50%;
            opacity: 0;
            animation: float 8s infinite;
            z-index: 0;
        }
        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 10s; }
        .particle:nth-child(2) { left: 30%; animation-delay: 2s; animation-duration: 12s; }
        .particle:nth-child(3) { left: 50%; animation-delay: 4s; animation-duration: 8s; }
        .particle:nth-child(4) { left: 70%; animation-delay: 1s; animation-duration: 11s; }
        .particle:nth-child(5) { left: 90%; animation-delay: 3s; animation-duration: 9s; }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="login-container">
        <div class="login-brand">
            <h1>NETFLIX</h1>
            <p>Data Explorer</p>
        </div>

        <div class="login-card">
            <h2>Sign In</h2>
            <p class="subtitle">Enter your credentials to explore the data</p>

            {% if error %}
            <div class="error-message">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="login-footer">
                MindX Python K1 Final Project
            </div>
        </div>
    </div>
</body>
</html>
